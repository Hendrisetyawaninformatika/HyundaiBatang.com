<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYUNDAI BATANG - Showroom Terpercaya</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    
    <script src="firebase-config.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f7fa; color: #1e2a3e; }
        
        header { background: #003d6b; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo h1 { font-size: 1.4rem; font-weight: bold; }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; }
        .nav-links a { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.95rem; font-weight: 500; }
        .nav-links a:hover, .nav-links a.active { color: white; }
        .btn-admin-gate { background: #ff6b35; padding: 0.5rem 1rem; border-radius: 6px; color: white !important; font-weight: bold; }

        .hero { background: linear-gradient(rgba(0,61,107,0.8), rgba(0,61,107,0.9)), url('https://via.placeholder.com/1200x400') center/cover; text-align: center; padding: 5rem 1rem; color: white; }
        .hero h2 { font-size: 2.2rem; margin-bottom: 0.5rem; }

        .catalog-container { max-width: 1200px; margin: 3rem auto; padding: 0 1rem; }
        .section-title { margin-bottom: 2rem; font-size: 1.5rem; border-left: 4px solid #ff6b35; padding-left: 0.5rem; }
        
        .car-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
        .car-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: transform 0.3s; cursor: pointer; display: flex; flex-direction: column; }
        .car-card:hover { transform: translateY(-5px); }
        .car-img-box { width: 100%; height: 180px; position: relative; background: #eee; }
        .car-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .badge-cond { position: absolute; top: 10px; left: 10px; background: #ff6b35; color: white; padding: 0.2rem 0.6rem; font-size: 0.75rem; border-radius: 4px; font-weight: bold; }
        .badge-status { position: absolute; top: 10px; right: 10px; background: #28a745; color: white; padding: 0.2rem 0.6rem; font-size: 0.75rem; border-radius: 4px; font-weight: bold; }
        
        .car-body { padding: 1.2rem; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .car-name { font-size: 1.15rem; font-weight: bold; color: #003d6b; margin-bottom: 0.5rem; }
        .car-price { font-size: 1.2rem; font-weight: 800; color: #ff6b35; margin-bottom: 0.8rem; }
        .car-meta { display: flex; justify-content: space-between; font-size: 0.8rem; color: #6c757d; border-top: 1px solid #eee; padding-top: 0.8rem; }
        
        .empty-view { text-align: center; color: gray; grid-column: 1 / -1; padding: 4rem 0; }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <h1>HYUNDAI BATANG</h1>
        </div>
        <nav class="nav-links">
            <a href="index.html" class="active">Katalog Produk</a>
            <a href="dashboard-firebase.html" class="btn-admin-gate" id="gateText">🔐 Panel Admin</a>
        </nav>
    </header>

    <section class="hero">
        <h2>Temukan Armada Hyundai Impian Anda</h2>
        <p>Layanan Showroom Transparan, Realtime & Terpercaya di Batang</p>
    </section>

    <main class="catalog-container">
        <h3 class="section-title">Koleksi Unit Showroom Berjalan</h3>
        <div class="car-grid" id="publicProductGrid">
            <div class="empty-view">Sedang menghubungkan ke server katalog...</div>
        </div>
    </main>

    <script>
        // Mengubah tampilan tombol login secara dinamis
        auth.onAuthStateChanged(user => {
            const gateText = document.getElementById('gateText');
            if(user) {
                gateText.innerHTML = "📊 Masuk Dashboard";
                gateText.style.background = "#28a745";
            } else {
                gateText.innerHTML = "🔐 Panel Admin";
                gateText.style.background = "#ff6b35";
            }
        });

        // Ambil data real-time untuk pembeli
        db.ref('cars').on('value', snapshot => {
            const grid = document.getElementById('publicProductGrid');
            const data = snapshot.val();
            
            if(!data) {
                grid.innerHTML = `<div class="empty-view"><h3>Maaf, katalog produk sedang kosong</h3><p>Silakan hubungi admin kami untuk informasi ketersediaan unit terbaru.</p></div>`;
                return;
            }

            const list = Object.keys(data).map(k => ({id: k, ...data[k]}));
            
            grid.innerHTML = list.map(car => `
                <div class="car-card" onclick="window.location.href='detail-mobil.html?id=${car.id}'">
                    <div class="car-img-box">
                        <img src="${car.image}" onerror="this.src='https://via.placeholder.com/300x180?text=Hyundai+Batang'">
                        <span class="badge-cond">${car.condition || 'Baru'}</span>
                        <span class="badge-status" style="background:${car.status==='Tersedia'?'#28a745':car.status==='Terjual'?'#dc3545':'#ffc107'}">${car.status || 'Tersedia'}</span>
                    </div>
                    <div class="car-body">
                        <div>
                            <h4 class="car-name">${car.name}</h4>
                            <div class="car-price">Rp ${parseInt(car.price || 0).toLocaleString('id-ID')}</div>
                        </div>
                        <div class="car-meta">
                            <span>📅 Tahun ${car.year}</span>
                            <span>⚙️ ${car.transmission || 'IVT'}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
