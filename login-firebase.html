<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | HYUNDAI BATANG Dashboard</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #003d6b 0%, #1e5a88 50%, #0f2a42 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .login-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.3);
            overflow: hidden;
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            background: linear-gradient(135deg, #003d6b, #1e5a88);
            padding: 2.5rem 2rem;
            text-align: center;
            color: white;
        }

        .login-header .logo-icon {
            width: 70px; height: 70px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2rem; font-weight: bold;
            border: 3px solid rgba(255,255,255,0.3);
        }

        .login-header h1 { font-size: 1.5rem; margin-bottom: 0.3rem; }
        .login-header p { opacity: 0.8; font-size: 0.9rem; }

        .login-form { padding: 2rem; }

        .form-group {
            margin-bottom: 1.3rem;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid #e0e0e0;
            border-radius: 14px;
            font-size: 1rem;
            transition: all 0.3s;
            background: #fafafa;
        }

        .form-group input:focus {
            outline: none;
            border-color: #003d6b;
            background: white;
            box-shadow: 0 0 0 4px rgba(0,61,107,0.1);
        }

        .form-group .icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            color: #999;
            margin-top: 12px;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #003d6b, #1e5a88);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,61,107,0.3);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-link:hover { color: #003d6b; }

        .error-msg, .success-msg {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            display: none;
            border-left: 4px solid;
        }

        .error-msg {
            background: #ffebee;
            color: #c62828;
            border-left-color: #c62828;
        }

        .success-msg {
            background: #e8f5e9;
            color: #2e7d32;
            border-left-color: #2e7d32;
        }

        .error-msg.show, .success-msg.show {
            display: block;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .google-btn {
            width: 100%;
            padding: 12px;
            background: white;
            color: #333;
            border: 2px solid #e0e0e0;
            border-radius: 14px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            margin-top: 1rem;
        }

        .google-btn:hover {
            background: #f8f9fa;
            border-color: #003d6b;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 1.2rem 0;
            color: #999;
            font-size: 0.8rem;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e0;
            margin: 0 0.8rem;
        }

        @media (max-width: 480px) {
            .login-header { padding: 2rem 1.5rem; }
            .login-form { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo-icon">H</div>
            <h1>HYUNDAI BATANG</h1>
            <p>Dashboard Admin - Kelola Data Mobil</p>
        </div>
        <div class="login-form">
            <div class="error-msg" id="errorMsg"></div>
            <div class="success-msg" id="successMsg"></div>
            
            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="admin@hyundaibatang.com" required autocomplete="email">
                    <span class="icon">📧</span>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Masukkan password" required autocomplete="current-password">
                    <span class="icon">🔒</span>
                </div>
                <button type="submit" class="btn-login" id="loginBtn">
                    <span>🔐</span> Masuk Dashboard
                </button>
            </form>
            
            <div class="divider">ATAU</div>
            
            <button class="google-btn" onclick="loginWithGoogle()">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Masuk dengan Google
            </button>
            
            <a href="index.html" class="back-link">← Kembali ke Website</a>
        </div>
    </div>

    <script>
        // 🔥 FIREBASE CONFIG - SUDAH DIISI DENGAN PROJECT ANDA
        const firebaseConfig = {
            apiKey: "AIzaSyDu4hHrtvn3R0kpZXE5JVN-XxhmCurp69o",
            authDomain: "mobilproject-e25d1.firebaseapp.com",
            databaseURL: "https://mobilproject-e25d1-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mobilproject-e25d1",
            storageBucket: "mobilproject-e25d1.firebasestorage.app",
            messagingSenderId: "465335606485",
            appId: "1:465335606485:web:fcf52bb8a24ef63ea8965c",
            measurementId: "G-CWG5Z70FRG"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // Cek apakah sudah login
        auth.onAuthStateChanged(user => {
            if (user) {
                window.location.href = 'dashboard-firebase.html';
            }
        });

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = '⚠️ ' + msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 4000);
        }

        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = '✅ ' + msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 4000);
        }

        function setLoading(loading) {
            const btn = document.getElementById('loginBtn');
            if (loading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="loading-spinner"></span> Memuat...';
            } else {
                btn.disabled = false;
                btn.innerHTML = '<span>🔐</span> Masuk Dashboard';
            }
        }

        // Login dengan Email/Password
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            setLoading(true);
            
            auth.signInWithEmailAndPassword(email, password)
                .then(userCredential => {
                    showSuccess('Login berhasil! Mengalihkan...');
                    setTimeout(() => {
                        window.location.href = 'dashboard-firebase.html';
                    }, 1000);
                })
                .catch(error => {
                    setLoading(false);
                    let msg = 'Terjadi kesalahan';
                    switch(error.code) {
                        case 'auth/user-not-found': msg = 'Email tidak terdaftar'; break;
                        case 'auth/wrong-password': msg = 'Password salah'; break;
                        case 'auth/invalid-email': msg = 'Format email tidak valid'; break;
                        case 'auth/too-many-requests': msg = 'Terlalu banyak percobaan, coba lagi nanti'; break;
                    }
                    showError(msg);
                });
            
            return false;
        }

        // Login dengan Google
        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .then(result => {
                    showSuccess('Login Google berhasil!');
                    setTimeout(() => {
                        window.location.href = 'dashboard-firebase.html';
                    }, 1000);
                })
                .catch(error => {
                    showError('Gagal login dengan Google: ' + error.message);
                });
        }
    </script>
</body>
</html>'''
